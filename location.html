<script>
    function getExactLocation() {
        const resultDiv = document.getElementById("result");
        
        if (navigator.geolocation) {
            resultDiv.innerHTML = "Locating...";
            
            const options = {
                enableHighAccuracy: true, 
                timeout: 10000,           
                maximumAge: 0             
            };

            navigator.geolocation.getCurrentPosition(successCallback, errorCallback, options);
        } else {
            resultDiv.innerHTML = "Geolocation is not supported by this browser.";
        }
    }

    function successCallback(position) {
        const resultDiv = document.getElementById("result");
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        
        // This updates the HTML page with the actual coordinates
        resultDiv.innerHTML = `
            <p>Latitude: ${lat}</p>
            <p>Longitude: ${lon}</p>
            <p><a href="https://www.google.com/maps?q=${lat},${lon}" target="_blank">📍 View on Google Maps</a></p>
        `;
    }

    function errorCallback(error) {
        const resultDiv = document.getElementById("result");
        if (error.code === 1) {
            resultDiv.innerHTML = "Permission denied. Please allow location access in your browser settings.";
        } else {
            resultDiv.innerHTML = "Error retrieving location: " + error.message;
        }
    }
    </script>
      <script>
    // 1. Check if user is logged in on page load
    window.onload = function() {
        if(localStorage.getItem('isLoggedIn') === 'true') {
            document.getElementById('auth-modal').style.display = 'none';
        }
    };

    function validateAccess() {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    if (email.includes('@') && email.length > 5 && pass.length >= 6) {
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('userEmail', email); // Save the email here
        document.getElementById('auth-modal').style.display = 'none';
        location.reload(); // Refresh to show the email immediately
    } else { alert("Please enter a valid email and a password of at least 6 characters."); }
}
</script>
<div id="auth-modal">
    <div class="auth-box">
        <h2 id="auth-title">Emperors Lounge</h2>
        <input type="text" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password (min 6 chars)">
        
        <button class="auth-btn" onclick="validateAccess()">Sign In / Create Account</button>
        
        <p style="font-size: 0.8rem; margin-top: 10px; color: #888;">
            Access is restricted to authorized users.
        </p>
    </div>
</div>

<script>
    // Logic to check if user is logged in
    window.onload = function() {
        if (localStorage.getItem('isLoggedIn') === 'true') {
            document.getElementById('auth-modal').style.display = 'none';
            document.getElementById('display-email').innerText = localStorage.getItem('userEmail');
        }
    };
    
    // Logic to sign in
    function validateAccess() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if (email.includes('@') && email.length > 5 && pass.length >= 6) {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userEmail', email);
            document.getElementById('auth-modal').style.display = 'none';
            location.reload();
        } else {
            alert("Please enter a valid email and a password of at least 6 characters.");
        }
    }
    
    // Logic to logout
    function logoutUser() {
        localStorage.removeItem('isLoggedIn');
        localStorage.removeItem('userEmail');
        location.reload();
    }
</script>
